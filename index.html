<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #sidebar {
            width: 300px;
            background: #1e293b;
            border-right: 2px solid #334155;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        #canvas-wrapper {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-color: #0f172a;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        .tool-btn {
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .tool-btn.active {
            border-color: #38bdf8;
            background-color: #334155;
        }
        .resource-chip {
            background: #334155;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #475569;
        }
        .building-card {
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            background: #334155;
            margin-bottom: 8px;
            border: 2px solid transparent;
        }
        .building-card:hover {
            background: #475569;
        }
        .building-card.selected {
            border-color: #38bdf8;
            background: #1e293b;
        }
        #tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #38bdf8;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 100;
            display: none;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        #coords {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(15, 23, 42, 0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: #38bdf8;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="sidebar" class="p-4">
        <h1 class="text-xl font-bold text-sky-400 mb-4 flex items-center gap-2">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            FORGE PROTOCOL
        </h1>

        <div id="resources" class="mb-6">
            <div class="resource-chip" title="Credits">
                <span class="text-green-400 font-bold">$</span>
                <span id="res-money" class="text-lg font-mono tracking-tight">250</span>
            </div>
        </div>

        <div class="flex gap-2 mb-4">
            <button id="btn-build" class="tool-btn active flex-1 py-2 bg-slate-700 rounded font-bold">BUILD</button>
            <button id="btn-sell" class="tool-btn flex-1 py-2 bg-slate-700 rounded font-bold text-yellow-400">SELL</button>
        </div>

        <div id="build-menu" class="flex-grow overflow-y-auto pr-2"></div>

        <div class="mt-4 p-3 bg-slate-800 rounded text-xs text-slate-400">
            <button id="btn-home" class="w-full mb-2 py-1 bg-sky-600 hover:bg-sky-500 text-white rounded font-bold transition-colors">CENTER VIEW (0,0)</button>
            <p>R: Rotate Building</p>
            <p>Right Click: Move / Deselect</p>
            <p>Scroll: Zoom</p>
            <p class="mt-1 text-[10px] opacity-50 italic text-sky-400">World Size 300x300 *non-persistent</p>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="tooltip"></div>
        <div id="coords">X: 0, Y: 0</div>
    </div>
</div>

<script>

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');
const tooltip = document.getElementById('tooltip');
const coordsDisplay = document.getElementById('coords');

const WORLD_SIZE = 300;
const OFFSET = WORLD_SIZE / 2;

const state = {
    camera: { x: 0, y: 0, zoom: 1 },
    gridSize: 40,
    resources: { money: 250 },
    buildings: [],
    items: [],
    selection: 'belt',
    mode: 'build',
    rotation: 0,
    lastTick: 0,
    mouse: { x: 0, y: 0, gridX: 0, gridY: 0, isDown: false, lastX: 0, lastY: 0 },
    oreMap: new Map(),
    floatingTexts: []
};

// Spawnrates increased by 500% (5x density)
const ORE_TYPES = {
    'cryston': { color: '#ef4444', label: 'Cryston', weight: 0.4, cluster: 45, count: 12, value: 1, drillSpeed: 1.0 },
    'bluorite': { color: '#3b82f6', label: 'Bluorite', weight: 0.4, cluster: 45, count: 12, value: 1, drillSpeed: 1.0 },
    'luxite': { color: '#a855f7', label: 'Luxite', weight: 0.3, cluster: 30, count: 8, value: 3, drillSpeed: 2.5 },
    'auxirite': { color: '#eab308', label: 'Auxirite', weight: 0.15, cluster: 15, count: 6, value: 5, drillSpeed: 3.5 }
};

const BUILDING_TYPES = {
    'belt': { name: 'Conveyor Belt', cost: 5, type: 'transport', color: '#475569', desc: 'Moves items forward.' },
    'drill': { name: 'Drill', cost: 50, type: 'producer', color: '#64748b', desc: 'Speed depends on ore type.' },
    'smelter': { name: 'Smelter', cost: 75, type: 'processor', color: '#334155', glow: '#f97316', desc: 'Refines ores (+20% value).' },
    'seller': { name: 'Selling Hub', cost: 100, type: 'consumer', color: '#064e3b', desc: 'Sells items for money.' }
};

function init() {
    generateOres();
    window.addEventListener('resize', resize);
    resize();
    renderBuildMenu();
    setupEventListeners();
    centerCamera();
    window.onbeforeunload = () => "Warning! Progress will not be saved!";
    requestAnimationFrame(gameLoop);
}

function generateOres() {
    state.oreMap.clear();
    const oreKeys = Object.keys(ORE_TYPES);
    oreKeys.forEach(typeKey => {
        const type = ORE_TYPES[typeKey];
        // Much higher node count for 500% increase
        const nodesToSpawn = Math.max(type.count, Math.floor(Math.random() * 20 * type.weight * 10));
        for (let i = 0; i < nodesToSpawn; i++) {
            let startX = Math.floor(Math.random() * WORLD_SIZE);
            let startY = Math.floor(Math.random() * WORLD_SIZE);
            let currX = startX;
            let currY = startY;
            const size = type.cluster * (4 + Math.random() * 5);
            for (let j = 0; j < size; j++) {
                if (currX >= 0 && currX < WORLD_SIZE && currY >= 0 && currY < WORLD_SIZE) {
                    state.oreMap.set(`${currX},${currY}`, typeKey);
                }
                currX += Math.floor(Math.random() * 3 - 1);
                currY += Math.floor(Math.random() * 3 - 1);
                if (Math.random() > 0.8) {
                    currX = startX + Math.floor(Math.random() * 3 - 1);
                    currY = startY + Math.floor(Math.random() * 3 - 1);
                }
            }
        }
    });
}

function resize() {
    canvas.width = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight;
}

function centerCamera() {
    const centerX = (WORLD_SIZE * state.gridSize) / 2;
    const centerY = (WORLD_SIZE * state.gridSize) / 2;
    state.camera.zoom = 0.8;
    state.camera.x = canvas.width / 2 - centerX * state.camera.zoom;
    state.camera.y = canvas.height / 2 - centerY * state.camera.zoom;
    clampCamera();
}

function clampCamera() {
    const gs = state.gridSize * state.camera.zoom;
    const worldW = WORLD_SIZE * gs;
    const worldH = WORLD_SIZE * gs;

    // Standard clamping logic
    if (worldW > canvas.width) {
        state.camera.x = Math.min(0, Math.max(state.camera.x, canvas.width - worldW));
    } else {
        state.camera.x = (canvas.width - worldW) / 2;
    }

    if (worldH > canvas.height) {
        state.camera.y = Math.min(0, Math.max(state.camera.y, canvas.height - worldH));
    } else {
        state.camera.y = (canvas.height - worldH) / 2;
    }
}

function renderBuildMenu() {
    const menu = document.getElementById('build-menu');
    menu.innerHTML = '';
    Object.keys(BUILDING_TYPES).forEach(id => {
        const b = BUILDING_TYPES[id];
        const card = document.createElement('div');
        card.className = `building-card ${state.selection === id ? 'selected' : ''}`;
        card.innerHTML = `<div class="flex justify-between font-bold text-sm"><span>${b.name}</span><span class="text-yellow-400">$${b.cost}</span></div><p class="text-[10px] text-slate-400 mt-1">${b.desc}</p>`;
        card.onclick = () => { state.selection = id; state.mode = 'build'; updateUI(); renderBuildMenu(); };
        menu.appendChild(card);
    });
}

function updateUI() {
    const money = state.resources.money;
    const displayMoney = money < 100 ? money.toFixed(1) : Math.floor(money).toString();
    document.getElementById('res-money').innerText = displayMoney;
    document.getElementById('btn-build').classList.toggle('active', state.mode === 'build');
    document.getElementById('btn-sell').classList.toggle('active', state.mode === 'sell');
}

function gameLoop(time) {
    const dt = (time - state.lastTick) / 1000;
    state.lastTick = time;
    if (dt < 0.1) update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

function isSpaceOccupied(gx, gy) {
    // Basic check for items currently in the center of a grid tile
    return state.items.some(item => Math.round(item.x) === gx && Math.round(item.y) === gy && item.progress < 0.4);
}

function update(dt) {
    state.buildings.forEach(b => {
        if (b.type === 'producer' || b.type === 'processor') {
            const oreType = state.oreMap.get(`${b.x},${b.y}`);
            const speed = (b.type === 'producer' && oreType) ? ORE_TYPES[oreType].drillSpeed : 2;

            // Logic: only progress if output space is clear
            if (!isSpaceOccupied(b.x, b.y)) {
                b.timer = (b.timer || 0) + dt;
                if (b.timer >= speed) {
                    if (b.type === 'producer' && oreType) {
                        b.timer = 0;
                        spawnItem(oreType, b.x, b.y, b.rotation);
                    }
                    // Smelter processing happens when item enters it (handled in item loop)
                }
            }
        }
    });

    for (let i = state.items.length - 1; i >= 0; i--) {
        const item = state.items[i];
        const speed = 2.0;
        let dx = 0, dy = 0;
        if (item.dir === 0) dx = speed * dt;
        else if (item.dir === 1) dy = speed * dt;
        else if (item.dir === 2) dx = -speed * dt;
        else if (item.dir === 3) dy = -speed * dt;

        // Check if next tile is occupied before moving forward past the half-point
        const nextX = Math.round(item.x + (item.dir === 0 ? 1 : item.dir === 2 ? -1 : 0));
        const nextY = Math.round(item.y + (item.dir === 1 ? 1 : item.dir === 3 ? -1 : 0));

        const nextBuilding = getBuildingAt(nextX, nextY);

        if (
            item.progress > 0.5 &&
            isSpaceOccupied(nextX, nextY) &&
            !(nextBuilding && nextBuilding.id === 'seller')
        ) {
            // ⛔ wait (unless it's a seller)
        } else {
            item.progress += speed * dt;
            item.x += dx;
            item.y += dy;
        }

        if (item.progress >= 1) {
            const curX = Math.round(item.x);
            const curY = Math.round(item.y);
            const b = getBuildingAt(curX, curY);

            if (b) {
                if (b.type === 'transport' || b.type === 'processor') {
                    item.x = curX; item.y = curY;
                    item.dir = b.rotation; item.progress = 0;
                    if (b.type === 'processor' && !item.processed) {
                        item.processed = true;
                        item.valueMultiplier = (item.valueMultiplier || 1) + 0.2;
                    }
                } else if (b.type === 'consumer') {
                    const val = (ORE_TYPES[item.id].value * (item.valueMultiplier || 1)).toFixed(1);
                    state.resources.money += parseFloat(val);
                    state.floatingTexts.push({ text: `+$${val}`, x: curX, y: curY, timer: 1.5 });
                    updateUI();
                    state.items.splice(i, 1);
                } else { state.items.splice(i, 1); }
            } else { state.items.splice(i, 1); }
        }
    }

    // Animate floating text
    for (let i = state.floatingTexts.length - 1; i >= 0; i--) {
        state.floatingTexts[i].timer -= dt;
        state.floatingTexts[i].y -= dt * 0.5;
        if (state.floatingTexts[i].timer <= 0) state.floatingTexts.splice(i, 1);
    }
}

function spawnItem(id, x, y, dir) {
    state.items.push({ id, x, y, dir, progress: 0, processed: false, valueMultiplier: 1 });
}

function getBuildingAt(x, y) { return state.buildings.find(b => b.x === x && b.y === y); }

function drawEdgeArrow(x, y, rotation, color, type = 'out') {
    const gs = state.gridSize;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();

    // Position on the edge
    ctx.translate(gs/2 - gs/8, 0);

    if (type === 'out') {
        ctx.moveTo(-gs/8, -gs/8); ctx.lineTo(0, 0); ctx.lineTo(-gs/8, gs/8);
    } else {
        ctx.moveTo(0, -gs/8); ctx.lineTo(-gs/8, 0); ctx.lineTo(0, gs/8);
    }
    ctx.stroke();
    ctx.restore();
}

function drawBuilding(b, x, y, rotation, opacity = 1) {
    const gs = state.gridSize;
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(x + gs/2, y + gs/2);

    const def = BUILDING_TYPES[b.id];

    if (b.id === 'seller') {
        ctx.fillStyle = def.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = '#4ade80';

        ctx.beginPath(); ctx.roundRect(-gs/2 + 4, -gs/2 + 4, gs - 8, gs - 8, 4); ctx.fill();

        ctx.shadowBlur = 0;
        ctx.fillStyle = '#4ade80';
        ctx.font = `bold ${gs/2.5}px Arial`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 1);
        // 4 Inward arrows
        for(let i=0; i<4; i++) drawEdgeArrow(0, 0, i * Math.PI/2, '#4ade80', 'in');
    }
    else if (b.id === 'drill') {
        ctx.fillStyle = def.color;
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#94a3b8';

        ctx.beginPath(); ctx.roundRect(-gs/2 + 4, -gs/2 + 4, gs - 8, gs - 8, 4); ctx.fill();

        ctx.shadowBlur = 0;
        // Non-rotating drill bit
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath(); ctx.moveTo(-gs/6, -gs/6); ctx.lineTo(gs/6, -gs/6); ctx.lineTo(0, gs/8); ctx.closePath(); ctx.fill();
        // Timer with curvy font
        ctx.fillStyle = 'white';
        ctx.font = `bold 11px 'Comfortaa', cursive`; ctx.textAlign = 'center';
        const ore = state.oreMap.get(`${b.x},${b.y}`);
        const speed = ore ? ORE_TYPES[ore].drillSpeed : 2;
        const remaining = Math.max(0, speed - (b.timer || 0));
        ctx.fillText(remaining.toFixed(1) + 's', 0, gs/2 - 6);
        // Directional arrow on the edge
        drawEdgeArrow(0, 0, b.rotation * Math.PI/2, 'white', 'out');
    }
    else if (b.id === 'smelter') {
        ctx.fillStyle = def.color;
        ctx.shadowBlur = 10; ctx.shadowColor = def.glow;
        ctx.beginPath(); ctx.roundRect(-gs/2 + 4, -gs/2 + 4, gs - 8, gs - 8, 4); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#f97316'; ctx.lineWidth = 2;
        ctx.strokeRect(-gs/6, -gs/6, gs/3, gs/3);
        // Output arrow
        drawEdgeArrow(0, 0, b.rotation * Math.PI/2, '#f97316', 'out');
        // Input arrows (3 sides)
        for(let i=1; i<4; i++) drawEdgeArrow(0, 0, (b.rotation + i) * Math.PI/2, '#f97316', 'in');
    }
    else {
        // Belts
        ctx.rotate(b.rotation * Math.PI/2);
        ctx.fillStyle = def.color;
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#94a3b8';

        ctx.beginPath(); ctx.roundRect(-gs/2 + 2, -gs/2 + 6, gs - 4, gs - 12, 4); ctx.fill();

        ctx.shadowBlur = 0;
        ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, -gs/4); ctx.lineTo(gs/4, 0); ctx.lineTo(0, gs/4); ctx.stroke();
    }
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(state.camera.x, state.camera.y);
    ctx.scale(state.camera.zoom, state.camera.zoom);

    const gs = state.gridSize;
    const startX = Math.max(0, Math.floor(-state.camera.x / (gs * state.camera.zoom)));
    const endX = Math.min(WORLD_SIZE, startX + Math.ceil(canvas.width / (gs * state.camera.zoom)) + 1);
    const startY = Math.max(0, Math.floor(-state.camera.y / (gs * state.camera.zoom)));
    const endY = Math.min(WORLD_SIZE, startY + Math.ceil(canvas.height / (gs * state.camera.zoom)) + 1);

    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, WORLD_SIZE * gs, WORLD_SIZE * gs);

    ctx.beginPath(); ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1/state.camera.zoom;
    for (let x = startX; x <= endX; x++) { ctx.moveTo(x*gs, startY*gs); ctx.lineTo(x*gs, endY*gs); }
    for (let y = startY; y <= endY; y++) { ctx.moveTo(startX*gs, y*gs); ctx.lineTo(endX*gs, y*gs); }
    ctx.stroke();

    for(let x = startX; x < endX; x++) {
        for(let y = startY; y < endY; y++) {
            const ore = state.oreMap.get(`${x},${y}`);
            if (ore) { ctx.fillStyle = ORE_TYPES[ore].color; ctx.globalAlpha = 0.3; ctx.fillRect(x*gs+4, y*gs+4, gs-8, gs-8); ctx.globalAlpha = 1.0; }
        }
    }

    state.buildings.forEach(b => {
        if (b.x >= startX && b.x < endX && b.y >= startY && b.y < endY) drawBuilding(b, b.x * gs, b.y * gs, b.rotation);
    });

    state.items.forEach(item => {
        const data = ORE_TYPES[item.id];

        ctx.save();

        ctx.glowbalAlpha = 0.9;
        ctx.shadowBlur = 8;
        ctx.shadowColor = data.color;

        ctx.fillStyle = data.color;

        if (item.processed) {
            ctx.fillRect(item.x * gs + gs/2 - 6, item.y * gs + gs/2 - 6, 12, 12);
        } else {
            ctx.beginPath();
            ctx.arc(item.x * gs + gs/2, item.y * gs + gs/2, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        ctx.restore();
    });

    if (state.mode === 'build' && state.selection) {
        const gx = state.mouse.gridX;
        const gy = state.mouse.gridY;
        if (gx >= 0 && gx < WORLD_SIZE && gy >= 0 && gy < WORLD_SIZE) {
            drawBuilding({id: state.selection, x: gx, y: gy, rotation: state.rotation, type: BUILDING_TYPES[state.selection].type}, gx * gs, gy * gs, state.rotation, 0.5);
        }
    }

    // Render floating texts
    state.floatingTexts.forEach(ft => {
        ctx.fillStyle = `rgba(74, 222, 128, ${Math.min(1, ft.timer * 1.5)})`;
        ctx.font = 'bold 16px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(ft.text, ft.x * gs + gs/2, ft.y * gs + gs/2 - 10);
    });

    ctx.restore();
}

function setupEventListeners() {
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    canvas.addEventListener('mousedown', e => {
        state.mouse.isDown = true; state.mouse.lastX = e.clientX; state.mouse.lastY = e.clientY;
        if (e.button === 0) {
            if (state.mode === 'build' && state.selection) placeBuilding();
            else if (state.mode === 'sell') sellBuilding();
        } else if (e.button === 2) {
            if (state.selection) { state.selection = null; updateUI(); renderBuildMenu(); }
        }
    });
    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        state.mouse.x = e.clientX - rect.left; state.mouse.y = e.clientY - rect.top;
        const worldX = (state.mouse.x - state.camera.x) / (state.gridSize * state.camera.zoom);
        const worldY = (state.mouse.y - state.camera.y) / (state.gridSize * state.camera.zoom);
        state.mouse.gridX = Math.floor(worldX); state.mouse.gridY = Math.floor(worldY);
        coordsDisplay.innerText = `X: ${state.mouse.gridX - OFFSET}, Y: ${state.mouse.gridY - OFFSET}`;
        if (state.mouse.isDown && e.buttons === 2) {
            state.camera.x += (e.clientX - state.mouse.lastX);
            state.camera.y += (e.clientY - state.mouse.lastY);
            clampCamera();
        }
        state.mouse.lastX = e.clientX; state.mouse.lastY = e.clientY;
        updateTooltip();
    });
    window.addEventListener('mouseup', () => { state.mouse.isDown = false; });
    window.addEventListener('keydown', e => { if (e.key.toLowerCase() === 'r') state.rotation = (state.rotation + 1) % 4; });
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const newZoom = Math.min(Math.max(state.camera.zoom * delta, 0.2), 3);

        // Zoom towards the center of the screen
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const worldX = (centerX - state.camera.x) / state.camera.zoom;
        const worldY = (centerY - state.camera.y) / state.camera.zoom;

        state.camera.zoom = newZoom;
        state.camera.x = centerX - worldX * state.camera.zoom;
        state.camera.y = centerY - worldY * state.camera.zoom;

        clampCamera();
    }, { passive: false });
    document.getElementById('btn-sell').onclick = () => { state.mode = 'sell'; state.selection = null; updateUI(); renderBuildMenu(); };
    document.getElementById('btn-build').onclick = () => { state.mode = 'build'; updateUI(); };
    document.getElementById('btn-home').onclick = () => centerCamera();
}

function placeBuilding() {
    const gx = state.mouse.gridX; const gy = state.mouse.gridY;
    if (gx < 0 || gx >= WORLD_SIZE || gy < 0 || gy >= WORLD_SIZE || getBuildingAt(gx, gy)) return;
    const def = BUILDING_TYPES[state.selection];
    if (state.resources.money >= def.cost) {
        state.resources.money -= def.cost;
        state.buildings.push({ id: state.selection, type: def.type, x: gx, y: gy, rotation: state.rotation, timer: 0 });
        updateUI();
    }
}

function sellBuilding() {
    const idx = state.buildings.findIndex(b => b.x === state.mouse.gridX && b.y === state.mouse.gridY);
    if (idx !== -1) {
        state.resources.money += BUILDING_TYPES[state.buildings[idx].id].cost;
        state.buildings.splice(idx, 1);
        updateUI();
    }
}

function updateTooltip() {
    const b = getBuildingAt(state.mouse.gridX, state.mouse.gridY);
    const ore = state.oreMap.get(`${state.mouse.gridX},${state.mouse.gridY}`);
    if (b || ore) {
        tooltip.style.display = 'block'; tooltip.style.left = (state.mouse.x + 20) + 'px'; tooltip.style.top = (state.mouse.y + 20) + 'px';
        let content = b ? `<strong class="text-sky-300 text-sm">${BUILDING_TYPES[b.id].name}</strong>` : "";
        if (b && ore) content += "<div class='my-1 border-t border-slate-700'></div>";
        if (ore) content += `<div class="flex items-center gap-2"><span style="background:${ORE_TYPES[ore].color}" class="w-2 h-2 rounded-full"></span><span class="font-medium text-slate-200">${ORE_TYPES[ore].label} ($${ORE_TYPES[ore].value})</span></div>`;
        tooltip.innerHTML = content;
    } else tooltip.style.display = 'none';
}

window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Protocol: Industrial Automation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-dark: #020617;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --accent-sky: #38bdf8;
            --accent-gold: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        #game-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        #sidebar {
            width: 320px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        #canvas-wrapper {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        .tool-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .tool-btn::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 2px;
            background: var(--accent-sky);
            transition: width 0.3s;
        }

        .tool-btn.active::after { width: 100%; }

        .building-card {
            transition: all 0.2s;
            border: 1px solid #1e293b;
        }

        .building-card:hover:not(.locked) {
            border-color: var(--accent-sky);
            background: #1e293b;
            transform: translateX(4px);
        }

        .building-card.selected {
            background: #1e293b;
            border-left: 4px solid var(--accent-sky);
        }

        #notification-center {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            pointer-events: none;
        }

        .notif {
            padding: 12px 20px;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.95);
            border-left: 4px solid var(--accent-sky);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease-out forwards;
            pointer-events: auto;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideOut {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }

        #sandbox-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <aside id="sidebar" class="p-6">
        <header class="mb-8">
            <h1 class="text-2xl font-black tracking-tighter text-sky-400 flex items-center gap-3">
                <div class="p-2 bg-sky-500/10 rounded-lg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                FORGE <span class="text-slate-500 font-light">PROTOCOL</span>
            </h1>
        </header>

        <section id="stats" class="grid grid-cols-1 gap-3 mb-8">
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <label class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Available Credits</label>
                <div class="flex items-center justify-between">
                    <span class="text-2xl font-mono text-emerald-400" id="res-money">$0</span>
                    <button id="btn-test-money" class="bg-emerald-600/80 hover:bg-emerald-500 text-white text-[10px] font-bold px-2 py-1 rounded transition-colors">+10k</button>
                </div>
            </div>
        </section>

        <div class="flex gap-2 mb-6 p-1 bg-slate-900 rounded-lg">
            <button id="btn-build" class="tool-btn active flex-1 py-2 text-xs font-bold tracking-widest rounded-md transition-colors hover:bg-slate-800">BUILD</button>
            <button id="btn-sell" class="tool-btn flex-1 py-2 text-xs font-bold tracking-widest text-amber-500 rounded-md transition-colors hover:bg-slate-800">DISMANTLE</button>
        </div>

        <div id="build-menu" class="flex-grow overflow-y-auto custom-scroll space-y-2"></div>

        <footer class="mt-6 pt-6 border-t border-slate-800">
            <div class="flex flex-col gap-2">
                <button id="btn-home" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-lg text-xs font-bold transition-all">CENTER VIEW</button>
                <div class="text-[10px] text-slate-500 leading-relaxed font-mono">
                    [R] Rotate | [R-CLICK] Cancel | [SHIFT+F+P] Sandbox Protocol
                </div>
            </div>
        </footer>
    </aside>

    <main id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="notification-center"></div>
        <div id="tooltip" class="fixed pointer-events-none bg-slate-900/95 border border-sky-500/50 p-3 rounded-lg text-xs hidden shadow-2xl z-[100]"></div>
        <div id="coords" class="absolute bottom-4 right-4 bg-slate-900/80 px-3 py-1 rounded border border-slate-700 font-mono text-[10px] text-sky-400">X:0 Y:0</div>
    </main>
</div>

<div id="sandbox-modal">
    <div class="bg-slate-900 border border-slate-700 p-8 rounded-2xl w-96 shadow-2xl">
        <h3 class="text-xl font-bold text-sky-400 mb-2">SANDBOX PROTOCOL</h3>
        <p class="text-slate-400 text-xs mb-6">Enter protocol authorization key to unlock terminal.</p>
        <input type="password" id="sandbox-key" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-lg mb-4 focus:border-sky-500 outline-none font-mono text-sky-400" placeholder="••••••••">
        <div class="flex gap-2">
            <button id="sb-cancel" class="flex-1 py-2 bg-slate-800 rounded-lg font-bold text-sm">CANCEL</button>
            <button id="sb-confirm" class="flex-1 py-2 bg-sky-600 rounded-lg font-bold text-sm">AUTHORIZE</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');
const tooltip = document.getElementById('tooltip');
const coordsDisplay = document.getElementById('coords');

const WORLD_SIZE = 300;
const GRID_SIZE = 40;
const OFFSET = WORLD_SIZE / 2;

const state = {
    camera: { x: 0, y: 0, zoom: 0.8 },
    resources: { money: 250 },
    buildings: [],
    items: [],
    selection: 'belt',
    mode: 'build',
    rotation: 0,
    lastTick: performance.now(),
    mouse: { x: 0, y: 0, gridX: 0, gridY: 0, isDown: false, dragging: false, startX: 0, startY: 0 },
    oreMap: new Map(),
    floatingTexts: [],
    notifications: [],
    frame: 0,
    sandboxEnabled: false
};

const ORE_TYPES = {
    'cryston': { color: '#ef4444', label: 'Cryston', value: 2, drillSpeed: 1.0, cluster: 16, weight: 10 },
    'bluorite': { color: '#3b82f6', label: 'Bluorite', value: 2, drillSpeed: 1.0, cluster: 16, weight: 10 },
    'luxite': { color: '#a855f7', label: 'Luxite', value: 5, drillSpeed: 2.0, cluster:12, weight: 5 },
    'auxirite': { color: '#fbbf24', label: 'Auxirite', value: 7, drillSpeed: 3.0, cluster:9, weight: 3 }
};

const BUILDING_TYPES = {
    'belt': {
        name: 'Conveyor Belts', cost: 5, type: 'transport', color: '#334155',
        desc: 'Directs resources toward factories.'
    },
    'drill': {
        name: 'Extraction Drill', cost: 50, type: 'producer', color: '#475569',
        desc: 'Extracts ores from mineral deposits below.'
    },
    'refinery': {
        name: 'Ore Refinery', cost: 75, type: 'processor', color: '#1e293b',
        desc: 'Converts raw ore into refined cubes (+50% value).'
    },
    'forge': {
        name: 'Refined Forge', cost: 150, type: 'processor', w: 2, h: 2, color: '#2e1065',
        desc: 'Fuses 2 identical cubes into a hexagon (3x value).'
    },
    'hub': {
        name: 'Trading Hub', cost: 100, type: 'consumer', color: '#064e3b',
        desc: 'Converts products into operational credits.'
    }
};

function init() {
    generateWorld();
    window.addEventListener('resize', resize);
    resize();
    renderBuildMenu();
    setupEvents();
    centerCamera();
    notify("Protocol Initialized. Ready for operation.", "success");

    window.addEventListener('beforeunload', (e) => {
        e.preventDefault();
        e.returnValue = '';
    });

    requestAnimationFrame(gameLoop);
}

function generateWorld() {
    const keys = Object.keys(ORE_TYPES);
    keys.forEach(k => {
        const type = ORE_TYPES[k];
        const count = Math.floor(10 * type.weight);
        for(let i = 0; i < count; i++) {
            let rx = Math.floor(Math.random() * WORLD_SIZE);
            let ry = Math.floor(Math.random() * WORLD_SIZE);
            const size = type.cluster + Math.random() * 5;
            for(let j = 0; j < size; j++) {
                if(rx >= 0 && rx < WORLD_SIZE && ry >= 0 && ry < WORLD_SIZE) {
                    state.oreMap.set(`${rx},${ry}`, k);
                }
                rx += Math.floor(Math.random() * 3 - 1);
                ry += Math.floor(Math.random() * 3 - 1);
            }
        }
    });
}

function resize() {
    canvas.width = wrapper.clientWidth;
    canvas.height = wrapper.clientHeight;
    clampCamera();
}

function clampCamera() {
    const maxZoomOut = canvas.width / (GRID_SIZE * 70);
    const maxZoomIn = canvas.width / (GRID_SIZE * 10);

    state.camera.zoom = Math.max(maxZoomOut, Math.min(state.camera.zoom, maxZoomIn));

    const gs = GRID_SIZE * state.camera.zoom;
    const worldW = WORLD_SIZE * gs;
    const worldH = WORLD_SIZE * gs;

    if (worldW > canvas.width) {
        state.camera.x = Math.min(0, Math.max(state.camera.x, canvas.width - worldW));
    } else {
        state.camera.x = (canvas.width - worldW) / 2;
    }

    if (worldH > canvas.height) {
        state.camera.y = Math.min(0, Math.max(state.camera.y, canvas.height - worldH));
    } else {
        state.camera.y = (canvas.height - worldH) / 2;
    }
}

function centerCamera() {
    const mid = (WORLD_SIZE * GRID_SIZE) / 2;
    const maxZoomOut = canvas.width / (GRID_SIZE * 70);
    const maxZoomIn = canvas.width / (GRID_SIZE * 10);

    state.camera.zoom = Math.max(maxZoomOut, Math.min(0.8, maxZoomIn));
    state.camera.x = canvas.width/2 - mid * state.camera.zoom;
    state.camera.y = canvas.height/2 - mid * state.camera.zoom;
    clampCamera();
}

function notify(msg, type = 'info') {
    const container = document.getElementById('notification-center');
    const el = document.createElement('div');
    el.className = `notif ${type === 'danger' ? 'border-red-500' : type === 'success' ? 'border-emerald-500' : 'border-sky-500'}`;
    el.innerHTML = msg;
    container.appendChild(el);
    setTimeout(() => {
        el.style.animation = 'slideOut 0.3s ease-in forwards';
        setTimeout(() => el.remove(), 300);
    }, 4000);
}

function renderBuildMenu() {
    const menu = document.getElementById('build-menu');
    menu.innerHTML = '';
    Object.keys(BUILDING_TYPES).forEach(id => {
        const b = BUILDING_TYPES[id];
        const card = document.createElement('div');
        card.className = `building-card p-4 rounded-xl cursor-pointer ${state.selection === id ? 'selected' : ''}`;
        card.innerHTML = `
            <div class="flex justify-between items-center mb-1">
                <span class="text-sm font-bold text-slate-100">${b.name}</span>
                <span class="text-xs font-mono text-emerald-400">$${b.cost}</span>
            </div>
            <p class="text-[10px] text-slate-500 leading-tight">${b.desc}</p>
        `;
        card.onclick = () => {
            state.selection = id;
            state.mode = 'build';
            updateSidebar();
            renderBuildMenu();
        };
        menu.appendChild(card);
    });
}

function updateSidebar() {
    document.getElementById('res-money').innerText = `$${Math.floor(state.resources.money)}`;
    document.getElementById('btn-build').classList.toggle('active', state.mode === 'build');
    document.getElementById('btn-sell').classList.toggle('active', state.mode === 'sell');
}

function getBuildingAt(x, y) {
    return state.buildings.find(b => {
        const w = BUILDING_TYPES[b.id].w || 1;
        const h = BUILDING_TYPES[b.id].h || 1;
        return x >= b.x && x < b.x + w && y >= b.y && y < b.y + h;
    });
}

function isOccupied(x, y, excludeItem = null) {
    return state.items.some(it => {
        if (it === excludeItem) return false;

        let dx = 0, dy = 0;
        if (it.dir === 0) dx = 1;
        else if (it.dir === 1) dy = 1;
        else if (it.dir === 2) dx = -1;
        else if (it.dir === 3) dy = -1;

        if (it.gridX === x && it.gridY === y && it.progress <= 0.5) return true;
        if (it.gridX + dx === x && it.gridY + dy === y && it.progress > 0.5) return true;

        return false;
    });
}

function gameLoop(now) {
    const dt = (now - state.lastTick) / 1000;
    state.lastTick = now;
    state.frame++;

    if (dt < 0.2) update(dt);
    draw();
    requestAnimationFrame(gameLoop);
}

function update(dt) {
    // Building Logic
    state.buildings.forEach(b => {
        if (b.id === 'drill') {
            const ore = state.oreMap.get(`${b.x},${b.y}`);
            if (ore) {
                const speed = ORE_TYPES[ore].drillSpeed;
                b.timer += dt;
                if (b.timer >= speed) {
                    if (!isOccupied(b.x, b.y)) {
                        spawnItem(ore, b.x, b.y, b.rotation);
                        b.timer = 0;
                        b.blocked = false;
                    } else {
                        b.blocked = true;
                        b.timer = speed; // Cap timer
                    }
                } else {
                    b.blocked = false;
                }
            }
        } else if (b.id === 'forge') {
            // Continuously check if Forge is ready to output
            if (b.buffer) {
                let port0Item = b.buffer.find(x => x.port === 0);
                let port1Item = b.buffer.find(x => x.port === 1);

                if (port0Item && port1Item) {
                    // Output on the right side of the factory
                    const outX = b.x + (b.rotation === 0 || b.rotation === 3 ? 1 : 0);
                    const outY = b.y + (b.rotation === 0 || b.rotation === 1 ? 1 : 0);

                    // Only produce and clear buffer if the exit tile is clear
                    if (!isOccupied(outX, outY)) {
                        let baseVal = port0Item.value;
                        b.buffer = []; // Clear buffer

                        state.items.push({
                            id: port0Item.id, gridX: outX, gridY: outY, dir: b.rotation, progress: 0,
                            refined: true, forged: true, value: baseVal * 3
                        });
                    }
                }
            }
        }
    });

    // Item Movement Logic
    for (let i = state.items.length - 1; i >= 0; i--) {
        const item = state.items[i];

        // Anti-Ghosting: If building gets dismantled, destroy the item immediately
        if (!getBuildingAt(item.gridX, item.gridY)) {
            state.items.splice(i, 1);
            continue;
        }

        const moveSpeed = 2.0;
        let dx = 0, dy = 0;
        if (item.dir === 0) dx = 1;
        else if (item.dir === 1) dy = 1;
        else if (item.dir === 2) dx = -1;
        else if (item.dir === 3) dy = -1;

        const nextX = item.gridX + dx;
        const nextY = item.gridY + dy;

        let requestedProgress = item.progress + moveSpeed * dt;
        let blocked = false;

        // Anti-clipping & Strict Rejection Logic
        if (requestedProgress > 0.5) {
            const bCurrent = getBuildingAt(item.gridX, item.gridY);
            const bNext = getBuildingAt(nextX, nextY);

            let opposes = false;
            if (bNext && bNext !== bCurrent) {
                if (bNext.type === 'producer') {
                    opposes = true; // Drills act as absolute solid walls
                } else if (bNext.id === 'forge') {
                    if (item.dir !== bNext.rotation) opposes = true; // Must enter Forge from back
                    if (!item.refined || item.forged) opposes = true; // Forge ONLY accepts refined cubes
                    if (bNext.buffer && bNext.buffer.length > 0 && bNext.buffer[0].id !== item.id) opposes = true; // Match type

                    const port = (bNext.rotation % 2 === 0) ? (nextY - bNext.y) : (nextX - bNext.x);
                    if (bNext.buffer && bNext.buffer.some(x => x.port === port)) opposes = true; // Block if this port already has an item
                } else if (bNext.id === 'refinery') {
                    if (item.dir !== bNext.rotation) opposes = true; // Must enter Refinery from back
                    if (item.refined || item.forged) opposes = true; // Refinery ONLY accepts raw circles
                } else if (bNext.type !== 'consumer' && Math.abs(item.dir - bNext.rotation) === 2) {
                    opposes = true; // Prevents entering the output side of a belt
                }
            }

            if (bNext?.id === 'hub') {
                blocked = false; // Trading Hub strictly accepts from all directions infinitely
            } else if (opposes || isOccupied(nextX, nextY, item)) {
                blocked = true;
            }
        }

        if (blocked) {
            item.progress = Math.min(requestedProgress, 0.5); // Halt exactly at the boundary edge (snaps back if slipping past)
        } else {
            item.progress = requestedProgress;
        }

        if (item.progress >= 1.0) {
            item.gridX = nextX;
            item.gridY = nextY;
            item.progress -= 1.0;

            const curX = item.gridX;
            const curY = item.gridY;
            const b = getBuildingAt(curX, curY);

            if (b) {
                if (b.id === 'belt') {
                    item.dir = b.rotation;
                } else if (b.id === 'refinery') {
                    if (!item.refined && !item.forged) {
                        item.dir = b.rotation;
                        item.refined = true;
                        item.value *= 1.5;
                    } else {
                        state.items.splice(i, 1);
                    }
                } else if (b.id === 'forge') {
                    if (item.refined && !item.forged) {
                        item.dir = b.rotation;
                        if (!b.buffer) b.buffer = [];

                        const port = (b.rotation % 2 === 0) ? (curY - b.y) : (curX - b.x);
                        b.buffer.push({ ...item, progress: 0, port: port });
                        state.items.splice(i, 1);

                        // Production logic moved to Building Logic loop above
                        continue;
                    } else if (item.forged) {
                        item.dir = b.rotation; // Allow Hexagon to safely travel across the second tile of the Forge
                    } else {
                        state.items.splice(i, 1);
                    }
                } else if (b.id === 'hub') {
                    const gain = item.value;
                    state.resources.money += gain;
                    state.floatingTexts.push({ x: curX, y: curY, text: `+$${gain.toFixed(0)}`, life: 1.0 });
                    state.items.splice(i, 1);
                } else {
                    state.items.splice(i, 1);
                }
            } else {
                state.items.splice(i, 1); // Delete if falls off into the void
            }
        }
    }

    state.floatingTexts = state.floatingTexts.filter(t => {
        t.life -= dt;
        t.y -= dt * 0.5;
        return t.life > 0;
    });

    if (state.frame % 30 === 0) updateSidebar();
}

function spawnItem(id, x, y, dir) {
    state.items.push({
        id, gridX: x, gridY: y, dir, progress: 0, refined: false, forged: false,
        value: ORE_TYPES[id].value
    });
}

function draw() {
    ctx.fillStyle = '#020617';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(state.camera.x, state.camera.y);
    ctx.scale(state.camera.zoom, state.camera.zoom);

    // Grid
    const startX = Math.max(0, Math.floor(-state.camera.x / (GRID_SIZE * state.camera.zoom)));
    const startY = Math.max(0, Math.floor(-state.camera.y / (GRID_SIZE * state.camera.zoom)));
    const endX = Math.min(WORLD_SIZE, startX + Math.ceil(canvas.width / (GRID_SIZE * state.camera.zoom)) + 1);
    const endY = Math.min(WORLD_SIZE, startY + Math.ceil(canvas.height / (GRID_SIZE * state.camera.zoom)) + 1);

    ctx.strokeStyle = '#1e293b';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let x = startX; x <= endX; x++) {
        ctx.moveTo(x * GRID_SIZE, startY * GRID_SIZE);
        ctx.lineTo(x * GRID_SIZE, endY * GRID_SIZE);
    }
    for (let y = startY; y <= endY; y++) {
        ctx.moveTo(startX * GRID_SIZE, y * GRID_SIZE);
        ctx.lineTo(endX * GRID_SIZE, y * GRID_SIZE);
    }
    ctx.stroke();

    // Ores
    for (let x = startX; x < endX; x++) {
        for (let y = startY; y < endY; y++) {
            const ore = state.oreMap.get(`${x},${y}`);
            if (ore) {
                ctx.fillStyle = ORE_TYPES[ore].color;
                ctx.globalAlpha = 0.2;
                ctx.fillRect(x * GRID_SIZE + 4, y * GRID_SIZE + 4, GRID_SIZE - 8, GRID_SIZE - 8);
                ctx.globalAlpha = 1.0;
            }
        }
    }

    state.buildings.forEach(b => drawBuilding(b));

    // Items
    state.items.forEach(it => {
        const color = ORE_TYPES[it.id].color;

        let dx = 0, dy = 0;
        if (it.dir === 0) dx = 1;
        else if (it.dir === 1) dy = 1;
        else if (it.dir === 2) dx = -1;
        else if (it.dir === 3) dy = -1;

        const cx = (it.gridX + dx * it.progress + 0.5) * GRID_SIZE;
        const cy = (it.gridY + dy * it.progress + 0.5) * GRID_SIZE;

        ctx.fillStyle = color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = color;

        if (it.forged) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(state.frame * 0.02); // Continuous spinning animation

            // Outer hexagon
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                ctx.lineTo(11 * Math.cos(i*Math.PI/3), 11 * Math.sin(i*Math.PI/3)); // Increased size
            }
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Inner geometric detail
            ctx.beginPath();
            for(let i=0; i<6; i++) {
                ctx.lineTo(5 * Math.cos(i*Math.PI/3), 5 * Math.sin(i*Math.PI/3));
            }
            ctx.closePath();
            ctx.stroke();

            ctx.restore();
        } else if (it.refined) {
            ctx.fillRect(cx - 6, cy - 6, 12, 12);
            ctx.strokeStyle = 'white';
            ctx.strokeRect(cx - 6, cy - 6, 12, 12);
        } else {
            ctx.beginPath();
            ctx.arc(cx, cy, 6, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.shadowBlur = 0;
    });

    state.floatingTexts.forEach(t => {
        ctx.fillStyle = `rgba(52, 211, 153, ${t.life})`;
        ctx.font = 'bold 14px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText(t.text, (t.x + 0.5) * GRID_SIZE, (t.y + 0.2) * GRID_SIZE);
    });

    if (state.mode === 'build' && state.selection) {
        ctx.globalAlpha = 0.4;
        drawBuilding({ id: state.selection, x: state.mouse.gridX, y: state.mouse.gridY, rotation: state.rotation, timer: 0 });
        ctx.globalAlpha = 1.0;
    }

    ctx.restore();
}

function drawEdgeArrow(x, y, rotation, color, type = 'out') {
    const gs = GRID_SIZE;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rotation);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.translate(gs/2 - gs/8, 0);
    if (type === 'out') {
        ctx.moveTo(-gs/8, -gs/8); ctx.lineTo(0, 0); ctx.lineTo(-gs/8, gs/8);
    } else {
        ctx.moveTo(0, -gs/8); ctx.lineTo(-gs/8, 0); ctx.lineTo(0, gs/8);
    }
    ctx.stroke();
    ctx.restore();
}

function drawBuilding(b) {
    const def = BUILDING_TYPES[b.id];
    const w = def.w || 1;
    const h = def.h || 1;
    const x = b.x * GRID_SIZE;
    const y = b.y * GRID_SIZE;
    const gs = GRID_SIZE;
    const half = gs / 2;

    ctx.save();
    ctx.translate(x + w * half, y + h * half);

    if (b.id === 'belt') {
        ctx.rotate(b.rotation * Math.PI / 2);
        ctx.fillStyle = def.color;
        ctx.beginPath();
        ctx.roundRect(-half + 4, -half + 8, gs - 8, gs - 16, 4);
        ctx.fill();
        const offset = ((state.lastTick % 1000) / 1000) * (gs / 2) - gs / 4;
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(offset - 4, -half/4);
        ctx.lineTo(offset + 4, 0);
        ctx.lineTo(offset - 4, half/4);
        ctx.stroke();
    }
    else if (b.id === 'drill') {
        ctx.fillStyle = def.color;
        ctx.beginPath(); ctx.roundRect(-half + 4, -half + 4, gs - 8, gs - 8, 6); ctx.fill();

        ctx.save();
        if (!b.blocked) {
            ctx.rotate(state.frame * 0.1);
        }
        ctx.fillStyle = '#94a3b8';
        ctx.beginPath();
        for(let i=0; i<3; i++) {
            ctx.rotate(Math.PI*2/3);
            ctx.fillRect(-2, -half + 10, 4, half - 10);
        }
        ctx.restore();

        drawEdgeArrow(0, 0, b.rotation * Math.PI/2, 'white', 'out');

        if (b.blocked) {
            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 24px JetBrains Mono';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const pulse = Math.abs(Math.sin(state.frame * 0.08)) * 8 + 2;
            ctx.shadowBlur = pulse;
            ctx.shadowColor = '#ef4444';
            ctx.fillText('!', 0, 2);
            ctx.shadowBlur = 0;
        }
    }
    else if (b.id === 'refinery') {
        ctx.fillStyle = def.color;
        ctx.beginPath(); ctx.roundRect(-half + 4, -half + 4, gs - 8, gs - 8, 8); ctx.fill();

        const glow = Math.sin(state.frame * 0.03) * 3 + 5;
        ctx.shadowBlur = glow;
        ctx.shadowColor = '#f97316';
        ctx.fillStyle = '#f97316';
        ctx.fillRect(-7, -7, 14, 14);
        ctx.shadowBlur = 0;

        drawEdgeArrow(0, 0, b.rotation * Math.PI/2, '#f97316', 'out');
        drawEdgeArrow(0, 0, (b.rotation + 2) * Math.PI/2, '#f97316', 'in');
    }
    else if (b.id === 'forge') {
        ctx.rotate(b.rotation * Math.PI / 2);
        ctx.fillStyle = def.color;
        const bw = w * gs - 8;
        const bh = h * gs - 8;
        ctx.beginPath(); ctx.roundRect(-w*half + 4, -h*half + 4, bw, bh, 8); ctx.fill();

        const glow = Math.sin(state.frame * 0.05) * 6 + 8;
        ctx.shadowBlur = glow;
        ctx.shadowColor = '#d8b4fe';
        ctx.fillStyle = '#c084fc';
        ctx.strokeStyle = '#c084fc';

        ctx.save();
        ctx.rotate(state.frame * -0.015);
        ctx.lineWidth = 2;
        ctx.beginPath();
        for(let i=0; i<6; i++) {
            ctx.lineTo(14 * Math.cos(i*Math.PI/3), 14 * Math.sin(i*Math.PI/3));
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.rotate(state.frame * 0.01);
        const coreSize = 8 + Math.sin(state.frame * 0.1) * 2;
        ctx.beginPath();
        for(let i=0; i<6; i++) {
            ctx.lineTo(coreSize * Math.cos(i*Math.PI/3), coreSize * Math.sin(i*Math.PI/3));
        }
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#ffffff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ffffff';
        ctx.beginPath();
        ctx.arc(0, 0, 2, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        ctx.shadowBlur = 0;

        drawEdgeArrow(gs/2, gs/2, 0, '#c084fc', 'out');
        drawEdgeArrow(-gs/2, -gs/2, Math.PI, '#c084fc', 'in');
        drawEdgeArrow(-gs/2, gs/2, Math.PI, '#c084fc', 'in');
    }
    else if (b.id === 'hub') {
        ctx.fillStyle = def.color;
        ctx.shadowBlur = 6;
        ctx.shadowColor = '#4ade80';
        ctx.beginPath(); ctx.roundRect(-half + 4, -half + 4, gs - 8, gs - 8, 8); ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#4ade80';
        ctx.font = 'bold 20px Inter';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('$', 0, 1);

        for(let i=0; i<4; i++) drawEdgeArrow(0, 0, i * Math.PI/2, '#4ade80', 'in');
    }

    ctx.restore();
}

function setupEvents() {
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    canvas.addEventListener('mousedown', e => {
        state.mouse.isDown = true;
        state.mouse.startX = e.clientX;
        state.mouse.startY = e.clientY;

        if (e.button === 0) {
            if (state.mode === 'build') placeBuilding();
            else if (state.mode === 'sell') dismantleBuilding();
        } else if (e.button === 2) {
            state.selection = null;
            renderBuildMenu();
        }
    });

    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        state.mouse.x = e.clientX - rect.left;
        state.mouse.y = e.clientY - rect.top;

        state.mouse.pageX = e.clientX;
        state.mouse.pageY = e.clientY;

        const worldX = (state.mouse.x - state.camera.x) / (GRID_SIZE * state.camera.zoom);
        const worldY = (state.mouse.y - state.camera.y) / (GRID_SIZE * state.camera.zoom);

        state.mouse.gridX = Math.floor(worldX);
        state.mouse.gridY = Math.floor(worldY);

        coordsDisplay.innerText = `X:${state.mouse.gridX - OFFSET} Y:${state.mouse.gridY - OFFSET}`;

        if (state.mouse.isDown && e.buttons === 2) {
            state.camera.x += (e.clientX - state.mouse.startX);
            state.camera.y += (e.clientY - state.mouse.startY);
            state.mouse.startX = e.clientX;
            state.mouse.startY = e.clientY;
            clampCamera();
        }
        updateTooltip();
    });

    window.addEventListener('mouseup', () => state.mouse.isDown = false);

    const activeKeys = {};

    window.addEventListener('keyup', e => {
        activeKeys[e.key.toLowerCase()] = false;
    });

    window.addEventListener('keydown', e => {
        activeKeys[e.key.toLowerCase()] = true;

        if (e.key.toLowerCase() === 'r') state.rotation = (state.rotation + 1) % 4;

        if (e.shiftKey && activeKeys['f'] && activeKeys['p']) {
            if (state.sandboxEnabled) {
                notify("SANDBOX PROTOCOL IS ALREADY ENABLED", "sky");
            } else {
                document.getElementById('sandbox-modal').style.display = 'flex';
            }
            activeKeys['f'] = false;
            activeKeys['p'] = false;
        }
    });

    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        const maxZoomOut = canvas.width / (GRID_SIZE * 70);
        const maxZoomIn = canvas.width / (GRID_SIZE * 10);
        const newZoom = Math.max(maxZoomOut, Math.min(state.camera.zoom * delta, maxZoomIn));

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const worldX = (centerX - state.camera.x) / state.camera.zoom;
        const worldY = (centerY - state.camera.y) / state.camera.zoom;

        state.camera.zoom = newZoom;
        state.camera.x = centerX - worldX * state.camera.zoom;
        state.camera.y = centerY - worldY * state.camera.zoom;

        clampCamera();
    }, { passive: false });

    document.getElementById('btn-build').onclick = () => state.mode = 'build';
    document.getElementById('btn-sell').onclick = () => { state.mode = 'sell'; state.selection = null; renderBuildMenu(); };
    document.getElementById('btn-home').onclick = () => centerCamera();

    document.getElementById('btn-test-money').onclick = () => {
        state.resources.money += 10000;
        updateSidebar();
    };

    document.getElementById('sb-cancel').onclick = () => {
        document.getElementById('sandbox-modal').style.display = 'none';
        document.getElementById('sandbox-key').value = '';
    };
    document.getElementById('sb-confirm').onclick = () => {
        const val = document.getElementById('sandbox-key').value;
        if (val === 'sandbox') {
            state.resources.money += 10000000;
            state.sandboxEnabled = true;
            notify("SANDBOX PROTOCOL ENABLED - $10,000,000 ADDED", "success");
            updateSidebar();
        } else {
            notify("ACCESS DENIED: INVALID KEY", "danger");
        }
        document.getElementById('sandbox-modal').style.display = 'none';
        document.getElementById('sandbox-key').value = '';
    };
}

function placeBuilding() {
    if (!state.selection) return;
    const gx = state.mouse.gridX;
    const gy = state.mouse.gridY;
    const def = BUILDING_TYPES[state.selection];
    const w = def.w || 1;
    const h = def.h || 1;

    if (gx < 0 || gx + w > WORLD_SIZE || gy < 0 || gy + h > WORLD_SIZE) return;

    for(let dx=0; dx<w; dx++) {
        for(let dy=0; dy<h; dy++) {
            if (getBuildingAt(gx + dx, gy + dy)) return;
        }
    }

    if (state.resources.money >= def.cost) {
        state.resources.money -= def.cost;
        state.buildings.push({
            id: state.selection,
            x: gx, y: gy,
            rotation: state.rotation,
            timer: 0
        });
        updateSidebar();
    } else {
        notify("Insufficient Credits", "danger");
    }
}

function dismantleBuilding() {
    const gx = state.mouse.gridX;
    const gy = state.mouse.gridY;

    const idx = state.buildings.findIndex(b => {
        const w = BUILDING_TYPES[b.id].w || 1;
        const h = BUILDING_TYPES[b.id].h || 1;
        return gx >= b.x && gx < b.x + w && gy >= b.y && gy < b.y + h;
    });

    if (idx !== -1) {
        const b = state.buildings[idx];
        state.resources.money += BUILDING_TYPES[b.id].cost * 0.8;
        state.buildings.splice(idx, 1);
        updateSidebar();
    }
}

function updateTooltip() {
    const b = getBuildingAt(state.mouse.gridX, state.mouse.gridY);
    const ore = state.oreMap.get(`${state.mouse.gridX},${state.mouse.gridY}`);

    if (b || ore) {
        tooltip.style.display = 'block';
        tooltip.style.left = (state.mouse.pageX + 15) + 'px';
        tooltip.style.top = (state.mouse.pageY + 15) + 'px';

        let html = '';
        if (b) html += `<div class="font-bold text-sky-400 mb-1">${BUILDING_TYPES[b.id].name}</div>`;
        if (ore) html += `<div class="text-slate-400">Ore: <span class="text-emerald-400">${ORE_TYPES[ore].label} ($${ORE_TYPES[ore].value})</span><br><span class="text-xs text-sky-300">Mine Speed: ${ORE_TYPES[ore].drillSpeed}s</span></div>`;
        tooltip.innerHTML = html;
    } else {
        tooltip.style.display = 'none';
    }
}

window.onload = init;
</script>
</body>
</html>
